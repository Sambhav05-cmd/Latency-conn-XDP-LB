syntax = "proto3";

package control;

option go_package = "lb/proto";

service WeightControl {
  rpc UpdateWeight   (WeightRequest)        returns (Empty);
  rpc AddBackend     (AddBackendRequest)    returns (Empty);
  rpc DeleteBackend  (DeleteBackendRequest) returns (Empty);
  rpc AddService     (ServiceRequest)       returns (Empty);
  rpc DeleteService  (ServiceRequest)       returns (Empty);
}

message WeightRequest {
  string ip     = 1;
  uint32 port   = 2;
  uint32 weight = 3;
}

message AddBackendRequest {
  string ip     = 1;
  uint32 port   = 2;
  uint32 weight = 3;
}

message DeleteBackendRequest {
  string ip   = 1;
  uint32 port = 2;
}

message ServiceRequest {
  string ip   = 1;
  uint32 port = 2;
}

message Empty {}